spring.application.name=Board7

#application.properties 파일안에서 명령 뒤에 # 주석 쓰지 말 것 - 중요
# Web page Setting :  시작 주소를 /로 설정
server.servlet.context-path=/

# server 의 port 번호
server.port = 8080

# jsp 가 저장될 폴더이름  "/src/main/webapp/WEB-INF/views/" + "home" + ".jsp"
spring.mvc.view.prefix = /WEB-INF/views/
spring.mvc.view.suffix = .jsp

# JSP 수정시 서버 재시작없이 바로 적용할 수 있게 설정
server.servlet.jsp.init-parameters.development = true

# mapper.xml 경로 설정
mybatis.mapper-locations:classpath:mapper/**/*Mapper.xml  

# datasource 설정
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=spring
spring.datasource.password=1234

# MyBatis SQL 로그 출력 설정
# 스프링 부트는 기본 로깅 툴로 이미 SLF4J(Logback)를 사용하고 있습니다
# Mybatis 스프링 부트 스타터(mybatis-spring-boot-starter)는 이 설정을 자동으로
# 감지하므로 굳이 적지 않아도 알아서 SLF4J로 로그를 보냅니다.
# mybatis.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# MyBatis 프레임워크 내부의 자질구레한 구동 로그까지 모두 출력되어 콘솔이 지저분해집니다.
# logging.level.org.apache.ibatis=DEBUG

# SQL 실행 시 파라미터 로그를 출력하기 위한 설정
logging.level.com.green.pds=DEBUG

## 파일업로드를 위해 추가된 부분
# file upload setting - no need library
spring.servlet.multipart.enabled=true

# 파일 저장 경로
spring.servlet.multipart.location=D:/2026/dev/springboot/data

# 업로드 될 파일당 최대 크기
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=1000MB

# properties 변수 
part1.upload-path=D:/2026/dev/springboot/data




